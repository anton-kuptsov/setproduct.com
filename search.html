<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Search — Setproduct</title>
<link href="/pagefind/pagefind-ui.css" rel="stylesheet">
<style>
  body { font-family: system-ui, sans-serif; margin: 0; padding: 0; background: #fff; color: #222; }
  .search-page { max-width: 860px; margin: 0 auto; padding: 80px 24px; }
  .search-page h1 { font-size: 2rem; font-weight: 700; margin-bottom: 32px; }
  .pagefind-ui { --pagefind-ui-scale: 1; --pagefind-ui-primary: #6B41F5; --pagefind-ui-text: #222; --pagefind-ui-background: #fff; --pagefind-ui-border: #e0e0e0; --pagefind-ui-border-radius: 8px; }
</style>
</head>
<body>
<div class="search-page">
  <h1>Search</h1>
  <div id="search" class="pagefind-ui"></div>
</div>
<script src="/pagefind/pagefind-ui.js"></script>
<script>
  const ui = new PagefindUI({ element: "#search", showImages: true });

  // Берём query из URL (?query=...)
  const params = new URLSearchParams(window.location.search);
  const q = params.get("query");
  if (q) ui.triggerSearch(q);
</script>
</body>
</html>
